<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StratDistill Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; margin: 18px; color: #1f2937; }
    .row { display:flex; gap: 14px; align-items: center; flex-wrap: wrap; }
    .card { border:1px solid #ddd; border-radius:10px; padding:12px; margin-top:10px; background:#fff; }
    #seriesChart, #actionChart { width:100%; height:460px; }
    .meta { color:#4b5563; font-size:13px; line-height:1.6; }
    .summary-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:10px; margin-top:10px; }
    .metric { background:#f8fafc; border-radius:8px; padding:10px; }
    .metric .label { font-size:12px; color:#6b7280; }
    .metric .value { font-size:16px; font-weight:600; margin-top:4px; }
    select { padding: 4px 8px; }
    code { background:#f3f4f6; padding:1px 4px; border-radius:4px; }
  </style>
</head>
<body>
  <h2>StratDistill Top Strategies Dashboard</h2>
  <div class="meta">
    说明：action 来自公开 <code>userFills</code>，按 leader 聚合，仅作为 position / action proxy。<br/>
    图例说明：<b>PnL curve</b> = 蓝线；<b>绿色点</b> = closed pnl &gt; 0；<b>红色点</b> = closed pnl &lt; 0；<b>灰色点</b> = closed pnl ≈ 0 / N.A.；<b>▲</b> = buy / long / open；<b>▼</b> = sell / short；<b>✕</b> = close；点越大表示成交规模（|sz|）越大。
  </div>
  <div id="buildMeta" class="meta" style="margin-top:6px;"></div>

  <div class="row card">
    <label>选择策略：</label>
    <select id="strategySelect"></select>
    <label>序列窗口：</label>
    <select id="seriesType">
      <option value="allTime">allTime</option>
      <option value="month">month</option>
      <option value="week">week</option>
      <option value="day">day</option>
    </select>
    <label>行为筛选：</label>
    <select id="actionMode">
      <option value="all">全部</option>
      <option value="open">Open / Buy / Sell</option>
      <option value="close">Close</option>
    </select>
  </div>

  <div class="card" id="summary"></div>
  <div class="card"><div id="seriesChart"></div></div>
  <div class="card"><div id="actionChart"></div></div>

  <script>
    let DATA = null;

    function fmt(n, digits = 4){
      if(n===null || n===undefined || Number.isNaN(Number(n))) return '-';
      return Number(n).toLocaleString(undefined,{maximumFractionDigits:digits});
    }

    function fmtPct(n, digits = 2){
      if(n===null || n===undefined || Number.isNaN(Number(n))) return '-';
      return `${(Number(n) * 100).toFixed(digits)}%`;
    }

    function filteredActions(fills, mode){
      if(mode==='all') return fills || [];
      return (fills || []).filter(f => {
        const d=(f.dir||'').toLowerCase();
        if(mode==='close') return d.includes('close');
        return d.includes('buy') || d.includes('sell') || d.includes('long') || d.includes('short') || d.includes('open');
      });
    }

    function actionSymbol(f){
      const d = (f.dir || '').toLowerCase();
      if(d.includes('close')) return 'x';
      if(d.includes('sell') || d.includes('short')) return 'triangle-down';
      return 'triangle-up';
    }

    function actionColor(f){
      const pnl = Number(f.closedPnl);
      if(Number.isNaN(pnl) || Math.abs(pnl) < 1e-12) return '#6b7280';
      return pnl > 0 ? '#16a34a' : '#dc2626';
    }

    function actionSize(f){
      return Math.max(8, Math.min(18, Math.log1p(Math.abs(Number(f.sz) || 0)) * 4));
    }

    function normalizeSeriesItem(item, sourceHint=null){
      let time = item?.time ?? null;
      if((time === null || time === undefined) && item?.ts){
        const parsed = new Date(item.ts).getTime();
        if(Number.isFinite(parsed)) time = parsed;
      }
      const idx = item?.idx ?? null;
      const value = item?.value ?? item?.v ?? null;
      return {
        time: time === null || time === undefined ? null : Number(time),
        idx: idx === null || idx === undefined ? null : Number(idx),
        value: Number(value),
        source: item?.source || sourceHint || null,
      };
    }

    function sortSeries(series){
      return (series || []).slice().sort((a, b) => {
        const ax = a.time ?? a.idx ?? 0;
        const bx = b.time ?? b.idx ?? 0;
        return ax - bx;
      });
    }

    function extractSeries(strategy, sType, metric='preferred'){
      const rawSeries = strategy?.series;

      if(Array.isArray(rawSeries)){
        const bucket = rawSeries.filter(x => x.series === sType);
        const account = bucket.filter(x => x.source === 'accountValueHistory');
        const pnl = bucket.filter(x => x.source !== 'accountValueHistory');

        let picked = bucket;
        if(metric === 'account') picked = account.length ? account : bucket;
        else if(metric === 'pnl') picked = pnl.length ? pnl : bucket;
        else picked = account.length ? account : (pnl.length ? pnl : bucket);

        return sortSeries(picked.map(x => normalizeSeriesItem(x)));
      }

      const typed = (rawSeries || {})[sType] || {};
      const account = Array.isArray(typed.account) ? typed.account : [];
      const pnl = Array.isArray(typed.pnl) ? typed.pnl : [];
      let picked = [];
      let sourceHint = null;

      if(metric === 'account') {
        picked = account.length ? account : pnl;
        sourceHint = account.length ? 'accountValueHistory' : 'pnlHistory';
      } else if(metric === 'pnl') {
        picked = pnl.length ? pnl : account;
        sourceHint = pnl.length ? 'pnlHistory' : 'accountValueHistory';
      } else {
        picked = account.length ? account : pnl;
        sourceHint = account.length ? 'accountValueHistory' : 'pnlHistory';
      }

      return sortSeries(picked.map(x => normalizeSeriesItem(x, sourceHint)));
    }

    function hasTimeSeries(series){
      return (series || []).some(x => Number.isFinite(x.time));
    }

    function nearestCurvePoint(points, targetTime){
      if(!points.length) return null;
      let lo = 0, hi = points.length - 1;
      while(lo < hi){
        const mid = Math.floor((lo + hi) / 2);
        if(points[mid].time < targetTime) lo = mid + 1;
        else hi = mid;
      }
      const candA = points[lo];
      const candB = lo > 0 ? points[lo - 1] : null;
      if(!candB) return candA;
      return Math.abs(candA.time - targetTime) < Math.abs(candB.time - targetTime) ? candA : candB;
    }

    function buildOverlayMarkers(series, fills){
      const timePoints = (series || [])
        .filter(x => Number.isFinite(x.time) && Number.isFinite(x.value))
        .map(x => ({ time: Number(x.time), value: Number(x.value) }))
        .sort((a, b) => a.time - b.time);
      if(!timePoints.length) return [];

      return (fills || [])
        .filter(f => Number.isFinite(Number(f.time)))
        .map(f => {
          const pt = nearestCurvePoint(timePoints, Number(f.time));
          if(!pt) return null;
          return {
            ...f,
            curveTime: pt.time,
            curveValue: pt.value,
          };
        })
        .filter(Boolean);
    }

    function countSeriesPoints(strategy){
      const rawSeries = strategy?.series;
      if(Array.isArray(rawSeries)) return rawSeries.length;
      return Object.values(rawSeries || {}).reduce((sum, bucket) => {
        return sum + Object.values(bucket || {}).reduce((inner, arr) => inner + (Array.isArray(arr) ? arr.length : 0), 0);
      }, 0);
    }

    function renderBuildMeta(){
      const meta = DATA?.meta || {};
      const generatedAt = meta.generated_at || '-';
      const schemaVersion = meta.schema_version ?? 'legacy';
      const fillsFile = meta.leader_fills_file || '-';
      const detailsFile = meta.vault_details_file || '-';
      const note = meta.schema_version ? '' : ' | ⚠️ legacy bundle detected';
      document.getElementById('buildMeta').innerHTML = `data build: <code>${generatedAt}</code> | schema: <code>${schemaVersion}</code> | fills: <code>${fillsFile}</code> | details: <code>${detailsFile}</code>${note}`;
    }

    function renderSummary(s){
      document.getElementById('summary').innerHTML = `
        <div><b>${s.name}</b></div>
        <div class="meta" style="margin-top:6px;">
          rank: ${s.extended_rank} | extended score: ${fmt(s.extended_score)} | composite score: ${fmt(s.composite_score)}<br/>
          vault: <code>${s.vault_address}</code><br/>
          leader: <code>${s.leader || '-'}</code>
        </div>
        <div class="summary-grid">
          <div class="metric"><div class="label">APR</div><div class="value">${fmtPct(s.apr)}</div></div>
          <div class="metric"><div class="label">TVL</div><div class="value">${fmt(s.tvl, 0)}</div></div>
          <div class="metric"><div class="label">All-time PnL</div><div class="value">${fmt(s.pnl_all_time_last, 0)}</div></div>
          <div class="metric"><div class="label">Max Drawdown</div><div class="value">${fmt(s.pnl_all_time_max_dd, 0)}</div></div>
          <div class="metric"><div class="label">Stability (std ΔPnL)</div><div class="value">${fmt(s.pnl_all_time_stability, 0)}</div></div>
          <div class="metric"><div class="label">Series / Fills</div><div class="value">${countSeriesPoints(s)} / ${(s.fills || []).length}</div></div>
        </div>
      `;
    }

    function render(){
      const idx = Number(document.getElementById('strategySelect').value || 0);
      const sType = document.getElementById('seriesType').value;
      const aMode = document.getElementById('actionMode').value;
      const s = DATA.strategies[idx];
      renderSummary(s);

      const displaySeries = extractSeries(s, sType, 'preferred');
      const acts = filteredActions(s.fills, aMode).slice().sort((a, b) => (a.time || 0) - (b.time || 0));
      const timedDisplaySeries = hasTimeSeries(displaySeries);
      const displayLabel = displaySeries[0]?.source === 'accountValueHistory' ? `${sType} account value` : `${sType} pnl`;
      const displayX = timedDisplaySeries ? displaySeries.map(x => new Date(x.time)) : displaySeries.map(x => x.idx);
      const displayY = displaySeries.map(x => x.value);

      Plotly.newPlot('seriesChart', [{
        x: displayX,
        y: displayY,
        type:'scatter',
        mode:'lines',
        name: displayLabel,
        line:{width:2, color:'#111827'},
        hovertemplate: timedDisplaySeries ? 'value=%{y}<br>%{x}<extra></extra>' : 'idx=%{x}<br>value=%{y}<extra></extra>'
      }], {
        title:`${s.name} - ${sType} curve`,
        xaxis:{title: timedDisplaySeries ? 'Time' : 'Index'},
        yaxis:{title: displaySeries[0]?.source === 'accountValueHistory' ? 'Account Value / NAV' : 'PnL'},
        legend:{orientation:'h'}
      }, {responsive:true});

      const pnlSeries = extractSeries(s, sType, 'pnl');
      const timedPnlSeries = hasTimeSeries(pnlSeries);
      const pnlX = timedPnlSeries ? pnlSeries.map(x => new Date(x.time)) : pnlSeries.map(x => x.idx);
      const pnlY = pnlSeries.map(x => x.value);
      const overlay = buildOverlayMarkers(pnlSeries, acts);
      const detailTexts = overlay.map(x => `${x.dir || '-'} ${x.coin || ''}<br>fill px=${fmt(x.px)}<br>sz=${fmt(x.sz)}<br>closedPnl=${fmt(x.closedPnl)}<br>anchored to nearest pnl point`);

      const actionTraces = [{
        x: pnlX,
        y: pnlY,
        mode:'lines',
        type:'scatter',
        name:'PnL curve',
        line:{width:2, color:'#2563eb'},
        hovertemplate: timedPnlSeries ? 'pnl=%{y}<br>%{x}<extra></extra>' : 'idx=%{x}<br>pnl=%{y}<extra></extra>'
      }];

      if(overlay.length){
        actionTraces.push({
          x: overlay.map(x => new Date(x.curveTime)),
          y: overlay.map(x => x.curveValue),
          mode:'markers',
          type:'scatter',
          name:'Actions (size=|sz|, color=closed pnl, shape=side)',
          marker:{
            size: overlay.map(actionSize),
            color: overlay.map(actionColor),
            symbol: overlay.map(actionSymbol),
            line:{width:0.8, color:'#111827'},
            opacity:0.9,
          },
          text: detailTexts,
          hovertemplate:'%{text}<br>%{x}<extra></extra>'
        });
      }

      const actionLayout = {
        title:`${s.name} - PnL with action overlay (${aMode})`,
        xaxis:{title: timedPnlSeries ? 'Time' : 'Index'},
        yaxis:{title:'PnL'},
        legend:{orientation:'h'},
        hovermode:'x unified',
        annotations: []
      };

      if(!overlay.length){
        actionLayout.annotations.push({
          text: timedPnlSeries ? 'No actions available for current filter.' : 'No timed PnL series in current data bundle. Re-run scripts/build_web_data.py to rebuild top_strategies.json.',
          xref:'paper', yref:'paper', x:0.5, y:0.95, showarrow:false, font:{size:12, color:'#6b7280'}
        });
      }

      Plotly.newPlot('actionChart', actionTraces, actionLayout, {responsive:true});
    }

    async function boot(){
      const resp = await fetch('./data/top_strategies.json');
      DATA = await resp.json();
      renderBuildMeta();
      const sel = document.getElementById('strategySelect');
      DATA.strategies.forEach((s, i) => {
        const o = document.createElement('option');
        o.value = String(i);
        o.textContent = `#${s.extended_rank} ${s.name}`;
        sel.appendChild(o);
      });
      ['strategySelect','seriesType','actionMode'].forEach(id => {
        document.getElementById(id).addEventListener('change', render);
      });
      render();
    }

    boot();
  </script>
</body>
</html>
